# Configuration for robot Nico with reusable follow behavior
# This demonstrates using a reusable behavior from behavior_architecture package
# alongside robot_nico's own behaviors

# Node name for the ROS blackboard node
node_name: "robot_nico_bt_node"

# Type of orchestrator to use (must be registered in OrchestratorFactory)
orchestrator_type: "robot_nico"

# Global package name for behaviors without explicit package_name
package_name: "robot_nico"

# Orchestrator libraries to load (contains the orchestrator registration)
orchestrator_libraries:
  - "librobot_nico_orchestrator.so"

# Packages that provide the external BT node plugins
bt_nodes_packages:
  - "social_bt_nodes"

# Plugin libraries to load (BehaviorTree.CPP plugins)
plugin_libraries:
  - "libsocial_bt_nodes_plugin.so"
  - "librobot_nico_bt_nodes.so"

# List of behaviors to create and manage
behaviors:
  # Robot Nico's own behaviors (use global package_name)
  - name: "state1_runner"
    behavior_file: "behaviors/dummy_state1.xml"
    control_period_ms: 50
  
  - name: "state2_runner"
    behavior_file: "behaviors/dummy_state2.xml"
    control_period_ms: 50
  
  # Reusable behavior from behavior_architecture package
  # This demonstrates using behaviors from the reusable catalogue
  - name: "follow_runner"
    behavior_file: "behaviors/reusable/follow_behavior.xml"
    package_name: "behavior_architecture"  # Override to load from behavior_architecture
    control_period_ms: 50

# NOTE: To use the follow_runner in your orchestrator, you can activate it like:
#   add_activation("follow_runner");
# 
# The orchestrator logic (states, transitions) is implemented in C++
# See robot_nico_orchestrator.cpp for the state machine implementation
